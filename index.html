<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0">
    <title>Biblioteca CIV | Sistema de Gestão Escolar</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --red-angola: #C8102E; --red-angola-dark: #A00D24; --gold-angola: #FFC72C; --gold-angola-dark: #E6B300;
            --primary: #1E40AF; --primary-dark: #1E3A8A; --primary-light: #DBEAFE; --primary-gradient: linear-gradient(135deg, #1E40AF, #3B82F6);
            --secondary: #7C3AED; --secondary-light: #EDE9FE; --success: #059669; --success-light: #D1FAE5; --success-gradient: linear-gradient(135deg, #059669, #10B981);
            --warning: #D97706; --warning-light: #FEF3C7; --warning-gradient: linear-gradient(135deg, #D97706, #F59E0B);
            --danger: #DC2626; --danger-light: #FEE2E2; --danger-gradient: linear-gradient(135deg, #DC2626, #EF4444);
            --info: #0EA5E9; --info-light: #E0F2FE;
            --gray-50: #F8FAFC; --gray-100: #F1F5F9; --gray-200: #E2E8F0; --gray-300: #CBD5E1; --gray-400: #94A3B8;
            --gray-500: #64748B; --gray-600: #475569; --gray-700: #334155; --gray-800: #1E293B; --gray-900: #0F172A;
            --surface-primary: #FFFFFF; --surface-secondary: #F8FAFC; --surface-sidebar: #0F172A;
            --surface-sidebar-hover: #1E293B; --surface-sidebar-active: #1E3A8A;
            --surface-overlay: rgba(0, 0, 0, 0.6); --surface-glass: rgba(255, 255, 255, 0.92);
            --text-primary: #0F172A; --text-secondary: #475569; --text-tertiary: #94A3B8; --text-inverse: #FFFFFF;
            --text-sidebar: #E2E8F0; --text-sidebar-muted: #94A3B8;
            --border-light: #E2E8F0; --border-medium: #CBD5E1; --border-focus: #3B82F6;
            --border-success: #059669; --border-error: #DC2626;
            --icon-input: #64748B; --icon-sidebar: #CBD5E1; --icon-header: #475569; --icon-muted: #94A3B8;
            --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            --font-display: 'Playfair Display', Georgia, 'Times New Roman', serif;
            --sidebar-width: 17rem; --header-height: 4rem;
            --z-sidebar: 40; --z-overlay: 30; --z-header: 20; --z-modal: 50; --z-toast: 60;
            /* ⭐ Novas variáveis de design */
            --shadow-stat: 0 4px 6px rgba(0,0,0,0.04), 0 2px 4px rgba(0,0,0,0.02);
            --shadow-stat-hover: 0 10px 25px rgba(0,0,0,0.08);
            --radius-stat: 1rem;
        }
        body.dark-mode {
            --surface-primary: #1E293B; --surface-secondary: #0F172A; --text-primary: #F1F5F9;
            --text-secondary: #CBD5E1; --text-tertiary: #94A3B8; --border-light: #334155;
            --gray-50: #1E293B; --gray-100: #334155; --gray-200: #475569; --surface-glass: rgba(30,41,59,0.92);
            --icon-input: #CBD5E1; --icon-sidebar: #E2E8F0; --icon-header: #CBD5E1; --icon-muted: #64748B;
            --shadow-stat: 0 4px 6px rgba(0,0,0,0.2); --shadow-stat-hover: 0 10px 25px rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-sans); background: var(--gray-50); color: var(--text-primary); line-height: 1.5; min-height: 100vh; overflow-x: hidden; transition: background 0.3s, color 0.3s; }

        /* ⭐ AUTH SCREEN */
        #authScreen {
            position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
            padding: 0.75rem; overflow-y: auto;
            background: linear-gradient(135deg, rgba(15,23,42,0.88) 0%, rgba(30,58,138,0.82) 50%, rgba(30,64,175,0.88) 100%), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center / cover;
        }
        .auth-card { background: var(--surface-glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); border-radius: 1.5rem; width: 100%; max-width: 26rem; padding: 1.25rem; animation: authCardIn 0.5s cubic-bezier(0.16,1,0.3,1); max-height: 95vh; overflow-y: auto; }
        @keyframes authCardIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .logo-container { width: 3.5rem; height: 3.5rem; background: linear-gradient(135deg, var(--gold-angola), var(--red-angola)); border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.75rem; box-shadow: 0 8px 32px rgba(200,16,46,0.3); }
        .logo-icon { font-size: 1.5rem; color: white; }
        .auth-tab { padding: 0.625rem 0.75rem; border: none; background: none; font-family: var(--font-sans); font-size: 0.8125rem; font-weight: 500; color: var(--text-secondary); border-bottom: 2px solid transparent; transition: all 0.2s; flex: 1; text-align: center; cursor: pointer; }
        .auth-tab i { color: var(--icon-input); }
        .auth-tab.active { color: var(--primary); font-weight: 600; border-bottom-color: var(--primary); }
        .auth-tab.active i { color: var(--primary); }
        .input-group { margin-bottom: 0.75rem; }
        .input-group label { display: block; font-size: 0.8125rem; font-weight: 500; margin-bottom: 0.25rem; color: var(--text-primary); }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-icon { position: absolute; left: 0.75rem; color: var(--icon-input); font-size: 0.875rem; pointer-events: none; z-index: 1; }
        .input-group input, .input-group select { width: 100%; padding: 0.5rem 0.75rem; padding-left: 2.5rem; border: 1.5px solid var(--border-light); border-radius: 0.75rem; font-family: var(--font-sans); font-size: 0.8125rem; background: var(--surface-primary); color: var(--text-primary); min-height: 2.5rem; transition: all 0.2s; }
        .input-group input:focus, .input-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); outline: none; }
        .toggle-password { position: absolute; right: 0.5rem; background: none; border: none; color: var(--icon-input); padding: 0.5rem; cursor: pointer; z-index: 1; }
        .btn-auth { width: 100%; padding: 0.625rem; border: none; border-radius: 0.75rem; font-family: var(--font-sans); font-size: 0.875rem; font-weight: 600; color: white; cursor: pointer; min-height: 2.75rem; transition: all 0.3s; }
        .btn-auth:active { transform: scale(0.97); }
        .btn-auth i { color: white; }
        .btn-auth-login { background: linear-gradient(135deg, var(--red-angola), #E53E3E); }
        .btn-auth-register { background: var(--primary-gradient); }

        /* Phone */
        .phone-input-group { display: flex; border: 1.5px solid var(--border-light); border-radius: 0.75rem; overflow: hidden; background: var(--surface-primary); transition: all 0.2s; }
        .phone-input-group:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .phone-input-group.valid { border-color: var(--border-success); } .phone-input-group.invalid { border-color: var(--border-error); }
        .country-selector { display: flex; align-items: center; gap: 0.25rem; padding: 0.5rem; background: var(--gray-50); border-right: 1px solid var(--border-light); font-size: 0.75rem; cursor: pointer; min-width: 80px; color: var(--text-primary); }
        .phone-number-input { flex: 1; border: none; outline: none; padding: 0.5rem 0.75rem; font-size: 0.8125rem; background: transparent; color: var(--text-primary); min-width: 0; }
        .phone-feedback { font-size: 0.625rem; margin-top: 0.25rem; }
        .phone-feedback.valid { color: var(--success); } .phone-feedback.invalid { color: var(--danger); } .phone-feedback.hint { color: var(--text-tertiary); }
        .country-dropdown { position: absolute; top: 100%; left: 0; width: 250px; max-height: 200px; overflow-y: auto; background: var(--surface-primary); border: 1px solid var(--border-light); border-radius: 0.75rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100; display: none; }
        .country-dropdown.show { display: block; }
        .country-option { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; cursor: pointer; font-size: 0.75rem; border-bottom: 1px solid var(--gray-100); color: var(--text-primary); }
        .country-option:hover { background: var(--gray-50); }
        .country-option.selected { background: var(--primary-light); color: var(--primary); font-weight: 600; }

        /* ⭐ SIDEBAR */
        #sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: min(85vw,18rem); background: var(--surface-sidebar); z-index: var(--z-sidebar); transform: translateX(-100%); transition: transform 0.3s; display: flex; flex-direction: column; }
        #sidebar:not(.sidebar-hidden) { transform: translateX(0); }
        @media (min-width: 1024px) { #sidebar { position: sticky; transform: translateX(0); width: var(--sidebar-width); } }
        .sidebar-header { padding: 0.75rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 0.75rem; }
        .sidebar-logo { width: 2.5rem; height: 2.5rem; background: linear-gradient(135deg, var(--gold-angola), var(--red-angola)); border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .sidebar-logo i { color: white; }
        .sidebar-brand h2 { font-size: 1rem; font-weight: 700; color: white; }
        .sidebar-brand p { font-size: 0.625rem; color: var(--text-sidebar-muted); }
        .sidebar-nav { flex: 1; padding: 0.5rem; display: flex; flex-direction: column; gap: 0.125rem; overflow-y: auto; }
        .sidebar-link { display: flex; align-items: center; gap: 0.625rem; padding: 0.55rem 0.75rem; border-radius: 0.75rem; color: var(--text-sidebar); font-size: 0.8125rem; cursor: pointer; transition: all 0.15s; min-height: 2.5rem; }
        .sidebar-link i { width: 1.25rem; text-align: center; font-size: 1rem; flex-shrink: 0; color: var(--icon-sidebar); }
        .sidebar-link:hover { background: var(--surface-sidebar-hover); color: white; transform: translateX(2px); }
        .sidebar-link:hover i { color: white; }
        .sidebar-link.active { background: var(--surface-sidebar-active); color: white; font-weight: 600; transform: translateX(4px); }
        .sidebar-link.active i { color: var(--gold-angola); }
        .sidebar-link.active::after { content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 60%; background: var(--gold-angola); border-radius: 3px 0 0 3px; }
        .sidebar-divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 0.5rem 0; }
        .sidebar-footer { padding: 0.75rem; border-top: 1px solid rgba(255,255,255,0.08); }
        .sidebar-user { display: flex; align-items: center; gap: 0.625rem; padding: 0.625rem; border-radius: 0.75rem; background: rgba(255,255,255,0.03); margin-bottom: 0.625rem; }
        .user-avatar { width: 2.5rem; height: 2.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.875rem; color: white; border: 2px solid var(--gold-angola); flex-shrink: 0; }
        .sidebar-user-info p { font-size: 0.8125rem; font-weight: 500; color: white; }
        .sidebar-user-info span { font-size: 0.625rem; color: var(--text-sidebar-muted); }
        .btn-logout { width: 100%; padding: 0.5rem; border: 1px solid rgba(239,68,68,0.3); border-radius: 0.75rem; background: rgba(239,68,68,0.1); color: #FCA5A5; font-size: 0.8125rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.15s; }
        .btn-logout i { color: #FCA5A5; }
        .btn-logout:hover { background: rgba(239,68,68,0.2); color: #FECACA; }
        .btn-logout:hover i { color: #FECACA; }
        #sidebarOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: calc(var(--z-sidebar)-1); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        #sidebarOverlay:not(.hidden) { opacity: 1; pointer-events: auto; }
        @media (min-width: 1024px) { #sidebarOverlay { display: none; } }

        /* ⭐ HEADER */
        .main-header { position: sticky; top: 0; z-index: var(--z-header); background: var(--surface-glass); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-light); padding: 0 0.75rem; height: var(--header-height); display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
        .header-left { display: flex; align-items: center; gap: 0.5rem; min-width: 0; flex: 1; }
        .btn-menu { width: 2.5rem; height: 2.5rem; border-radius: 0.75rem; border: 1px solid var(--border-light); background: var(--surface-primary); color: var(--icon-header); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; transition: all 0.15s; }
        .btn-menu:hover { background: var(--gray-100); }
        .btn-menu i { color: var(--icon-header); }
        @media (min-width: 1024px) { .btn-menu { display: none; } }
        .header-title { min-width: 0; }
        .header-title h1 { font-size: 1rem; font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        @media (min-width: 480px) { .header-title h1 { font-size: 1.1rem; } }
        .breadcrumb { display: none; font-size: 0.6875rem; color: var(--text-tertiary); align-items: center; gap: 0.25rem; }
        @media (min-width: 480px) { .breadcrumb { display: flex; } }
        .header-right { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
        #globalSearch { padding: 0.4rem 0.75rem; padding-left: 2.25rem; border: 1.5px solid var(--border-light); border-radius: 9999px; font-size: 0.75rem; background: var(--surface-secondary); width: 130px; min-height: 2.25rem; color: var(--text-primary); display: none; }
        @media (min-width: 480px) { #globalSearch { display: block; width: 150px; } }
        @media (min-width: 768px) { #globalSearch { width: 200px; } }
        .btn-notification { width: 2.5rem; height: 2.5rem; border-radius: 50%; border: 1px solid var(--border-light); background: var(--surface-primary); color: var(--icon-header); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; position: relative; flex-shrink: 0; transition: all 0.15s; }
        .btn-notification:hover { background: var(--gray-100); }
        .btn-notification i { color: var(--icon-header); }
        .notification-badge { position: absolute; top: -3px; right: -3px; width: 1.2rem; height: 1.2rem; background: var(--danger); color: white; font-size: 0.6rem; font-weight: 700; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--surface-primary); }
        .btn-dark-mode { width: 2.5rem; height: 2.5rem; border-radius: 50%; border: 1px solid var(--border-light); background: var(--surface-primary); color: var(--icon-header); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; transition: all 0.15s; }
        .btn-dark-mode:hover { background: var(--gray-100); }
        .btn-dark-mode i { color: var(--icon-header); }
        .main-content { flex: 1; padding: 0.75rem; overflow-y: auto; }
        @media (min-width: 640px) { .main-content { padding: 1.25rem; } }
        @media (min-width: 1024px) { .main-content { padding: 1.5rem; } }

        /* ⭐ STATS CARDS - MELHORADOS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.625rem; margin-bottom: 1rem; }
        @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.25rem; } }
        .stat-card {
            background: var(--surface-primary); border-radius: var(--radius-stat); padding: 1rem;
            box-shadow: var(--shadow-stat); border: 1px solid var(--border-light);
            position: relative; overflow: hidden; transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
            display: flex; flex-direction: column; gap: 0.5rem;
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-stat-hover); }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; border-radius: 4px 0 0 4px; }
        .stat-card.primary::before { background: var(--primary); }
        .stat-card.success::before { background: var(--success); }
        .stat-card.warning::before { background: var(--warning); }
        .stat-card.danger::before { background: var(--danger); }
        .stat-card.info::before { background: var(--info); }
        .stat-card-header { display: flex; align-items: center; justify-content: space-between; }
        .stat-icon { width: 2.75rem; height: 2.75rem; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .stat-card.primary .stat-icon { background: var(--primary-light); } .stat-card.primary .stat-icon i { color: var(--primary); }
        .stat-card.success .stat-icon { background: var(--success-light); } .stat-card.success .stat-icon i { color: var(--success); }
        .stat-card.warning .stat-icon { background: var(--warning-light); } .stat-card.warning .stat-icon i { color: var(--warning); }
        .stat-card.danger .stat-icon { background: var(--danger-light); } .stat-card.danger .stat-icon i { color: var(--danger); }
        .stat-card.info .stat-icon { background: var(--info-light); } .stat-card.info .stat-icon i { color: var(--info); }
        .stat-trend { font-size: 0.6875rem; font-weight: 600; display: flex; align-items: center; gap: 0.2rem; }
        .stat-trend.up { color: var(--success); } .stat-trend.down { color: var(--danger); }
        .stat-value { font-size: 1.75rem; font-weight: 800; line-height: 1; color: var(--text-primary); letter-spacing: -0.02em; }
        .stat-label { font-size: 0.6875rem; color: var(--text-secondary); font-weight: 500; }

        /* ⭐ DASHBOARD GRID */
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; }
        @media (min-width: 768px) { .dashboard-grid { grid-template-columns: 1fr 1fr; gap: 1rem; } }
        @media (min-width: 1024px) { .dashboard-grid { grid-template-columns: 2fr 1fr; } }

        /* ⭐ BOOKS GRID - CAPAS MAIORES */
        .books-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.625rem; }
        @media (min-width: 640px) { .books-grid { grid-template-columns: repeat(3, 1fr); gap: 0.75rem; } }
        @media (min-width: 1024px) { .books-grid { grid-template-columns: repeat(4, 1fr); gap: 1rem; } }
        @media (min-width: 1400px) { .books-grid { grid-template-columns: repeat(5, 1fr); } }
        .book-card {
            background: var(--surface-primary); border-radius: 1rem;
            box-shadow: var(--shadow-stat); border: 1px solid var(--border-light);
            transition: all 0.3s cubic-bezier(0.16,1,0.3,1); position: relative; overflow: hidden;
        }
        .book-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-stat-hover); }
        .book-cover { width: 100%; height: 170px; background: linear-gradient(135deg, #e0e7ff, #ede9fe); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        @media (min-width: 480px) { .book-cover { height: 190px; } }
        @media (min-width: 768px) { .book-cover { height: 210px; } }
        .book-cover img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
        .book-card:hover .book-cover img { transform: scale(1.08); }
        .book-cover-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 50%; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); opacity: 0; transition: opacity 0.3s; display: flex; align-items: flex-end; padding: 0.75rem; }
        .book-card:hover .book-cover-overlay { opacity: 1; }
        .book-cover-overlay span { color: white; font-size: 0.6875rem; font-weight: 500; }
        .book-cover-fallback { font-size: 3rem; opacity: 0.3; }
        .book-cover-fallback i { color: var(--primary); }
        .book-status-badge { position: absolute; top: 0.625rem; right: 0.625rem; z-index: 2; }
        .book-info { padding: 0.875rem; }
        .book-title { font-size: 0.875rem; font-weight: 700; margin-bottom: 0.125rem; line-height: 1.3; color: var(--text-primary); }
        .book-author { font-size: 0.6875rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .book-category { display: inline-block; font-size: 0.6rem; font-weight: 500; padding: 0.2rem 0.6rem; border-radius: 9999px; background: var(--gray-100); color: var(--text-secondary); }
        .book-actions { display: flex; gap: 0.375rem; margin-top: 0.625rem; flex-wrap: wrap; }

        /* ⭐ BADGES MELHORADOS */
        .badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.25rem 0.7rem; font-size: 0.6rem; font-weight: 600; border-radius: 9999px; letter-spacing: 0.01em; }
        .badge i { font-size: 0.55rem; }
        .badge-success { background: var(--success-light); color: var(--success); }
        .badge-danger { background: var(--danger-light); color: var(--danger); }
        .badge-warning { background: var(--warning-light); color: var(--warning); }
        .badge-primary { background: var(--primary-light); color: var(--primary); }
        .badge-secondary { background: var(--secondary-light); color: var(--secondary); }
        .badge-info { background: var(--info-light); color: var(--info); }
        .status-dot { width: 0.45rem; height: 0.45rem; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .status-dot.success { background: var(--success); }
        .status-dot.danger { background: var(--danger); }
        .status-dot.warning { background: var(--warning); }

        /* ⭐ BOTÕES */
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem; padding: 0.4rem 0.9rem; border-radius: 0.625rem; font-family: var(--font-sans); font-size: 0.7rem; font-weight: 500; border: 1.5px solid transparent; cursor: pointer; transition: all 0.2s cubic-bezier(0.16,1,0.3,1); white-space: nowrap; min-height: 2.25rem; }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary-gradient); color: white; } .btn-primary i { color: white; }
        .btn-success { background: var(--success-gradient); color: white; } .btn-success i { color: white; }
        .btn-danger { background: var(--danger-gradient); color: white; } .btn-danger i { color: white; }
        .btn-info { background: linear-gradient(135deg, #0EA5E9, #38BDF8); color: white; } .btn-info i { color: white; }
        .btn-ghost { background: transparent; border-color: var(--border-light); color: var(--text-secondary); }
        .btn-ghost i { color: var(--icon-input); }
        .btn-ghost:hover { background: var(--gray-100); color: var(--text-primary); }
        .btn-ghost:hover i { color: var(--text-primary); }
        .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.625rem; min-height: 1.85rem; }
        .btn:hover { transform: translateY(-1px); }
        .w-full { width: 100%; } .flex-1 { flex: 1; } .text-center { text-align: center; } .hidden { display: none !important; }
        .flex-wrap { flex-wrap: wrap; } .gap-2 { gap: 0.5rem; }

        /* ⭐ CONTENT CARDS */
        .content-card { background: var(--surface-primary); border-radius: 1rem; box-shadow: var(--shadow-stat); border: 1px solid var(--border-light); overflow: hidden; }
        .content-card-header { padding: 0.875rem 1rem; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
        .content-card-header h3 { font-size: 0.9375rem; font-weight: 700; display: flex; align-items: center; gap: 0.4rem; color: var(--text-primary); }
        .content-card-header h3 i { color: var(--primary); }
        .content-card-body { padding: 0.875rem 1rem; color: var(--text-primary); }

        /* ⭐ TABELAS MELHORADAS */
        .table-container { overflow-x: auto; border-radius: 0.5rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; min-width: 550px; }
        table thead { background: var(--gray-50); border-bottom: 2px solid var(--border-light); }
        table thead th { padding: 0.6rem 0.75rem; text-align: left; font-size: 0.6rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; }
        table tbody tr { border-bottom: 1px solid var(--border-light); transition: background 0.15s; }
        table tbody tr:hover { background: var(--gray-50); }
        table tbody td { padding: 0.6rem 0.75rem; color: var(--text-primary); vertical-align: middle; }
        .row-avatar { width: 2rem; height: 2rem; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.65rem; color: white; margin-right: 0.5rem; vertical-align: middle; }
        .loan-status-active { color: var(--primary); font-weight: 600; }
        .loan-status-returned { color: var(--success); font-weight: 600; }
        .loan-status-late { color: var(--danger); font-weight: 600; }

        /* ⭐ MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); z-index: var(--z-modal); display: flex; align-items: flex-end; justify-content: center; }
        @media (min-width: 480px) { .modal-overlay { align-items: center; padding: 1rem; } }
        .modal-container { background: var(--surface-primary); border-radius: 1.25rem 1.25rem 0 0; box-shadow: 0 -4px 24px rgba(0,0,0,0.2); width: 100%; max-height: 90vh; overflow-y: auto; animation: modalSlideUp 0.35s cubic-bezier(0.16,1,0.3,1); }
        @media (min-width: 480px) { .modal-container { border-radius: 1.25rem; max-width: 34rem; } }
        @keyframes modalSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { padding: 0.875rem 1rem; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface-primary); z-index: 1; }
        .modal-header h3 { font-size: 1rem; font-weight: 700; color: var(--text-primary); }
        .modal-close { width: 2rem; height: 2rem; border-radius: 50%; border: none; background: var(--gray-100); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
        .modal-close i { color: var(--icon-input); }
        .modal-close:hover { background: var(--danger-light); } .modal-close:hover i { color: var(--danger); }
        .modal-body { padding: 0.875rem 1rem; }
        .modal-footer { padding: 0.75rem 1rem; border-top: 1px solid var(--border-light); display: flex; justify-content: flex-end; gap: 0.5rem; position: sticky; bottom: 0; background: var(--surface-primary); }
        .form-group { margin-bottom: 0.75rem; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 500; margin-bottom: 0.25rem; color: var(--text-primary); }
        .form-input { width: 100%; padding: 0.5rem 0.75rem; border: 1.5px solid var(--border-light); border-radius: 0.625rem; font-family: var(--font-sans); font-size: 0.8125rem; background: var(--surface-primary); color: var(--text-primary); min-height: 2.5rem; transition: all 0.2s; }
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); outline: none; }
        .cover-preview { width: 100%; height: 150px; border-radius: 0.5rem; background: var(--gray-100); display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 0.75rem; }
        .cover-preview img { width: 100%; height: 100%; object-fit: cover; }

        /* ⭐ PERFIL */
        .profile-avatar-lg { width: 6rem; height: 6rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 2rem; color: white; border: 3px solid var(--gold-angola); margin: 0 auto 1rem; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }

        /* ⭐ TOAST */
        #toastContainer { position: fixed; bottom: 0.75rem; left: 0.75rem; right: 0.75rem; z-index: 60; display: flex; flex-direction: column; gap: 0.375rem; }
        @media (min-width: 480px) { #toastContainer { bottom: auto; top: 1rem; left: auto; right: 1rem; max-width: 360px; } }
        .toast { padding: 0.75rem 1rem; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 0.5rem; font-size: 0.8125rem; color: white; animation: toastIn 0.4s cubic-bezier(0.16,1,0.3,1); }
        .toast i { color: white; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-card">
            <div class="text-center" style="margin-bottom:1.25rem;">
                <div class="logo-container"><i class="fas fa-book-open logo-icon"></i></div>
                <h1 style="font-family:var(--font-display);font-size:1.25rem;font-weight:900;color:var(--text-primary);">Biblioteca CIV</h1>
                <p style="font-size:0.6875rem;color:var(--text-tertiary);">Ministério da Educação · Ensino Geral</p>
            </div>
            <div style="display:flex;border-bottom:1px solid var(--border-light);margin-bottom:1.25rem;">
                <button class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')"><i class="fas fa-sign-in-alt"></i> Entrar</button>
                <button class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')"><i class="fas fa-user-graduate"></i> Cadastrar</button>
            </div>
            <form id="loginForm">
                <div class="input-group"><label>E-mail</label><div class="input-wrapper"><i class="fas fa-envelope input-icon"></i><input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email"></div></div>
                <div class="input-group"><label>Palavra-passe</label><div class="input-wrapper"><i class="fas fa-lock input-icon"></i><input type="password" id="loginPassword" placeholder="••••••••"><button type="button" class="toggle-password" onclick="togglePassword('loginPassword',this)"><i class="fas fa-eye"></i></button></div></div>
                <button type="submit" class="btn-auth btn-auth-login" style="margin-top:0.5rem;"><i class="fas fa-arrow-right-to-bracket"></i> Entrar no Sistema</button>
            </form>
            <form id="registerForm" class="hidden">
                <div style="background:var(--primary-light);border:1px solid #BFDBFE;border-radius:0.625rem;padding:0.625rem;margin-bottom:1rem;font-size:0.6875rem;color:var(--primary);"><i class="fas fa-info-circle"></i> <strong>Cadastro.</strong> Gestores e funcionários são criados pelo administrador.</div>
                <div class="input-group"><label>Nome Completo <span style="color:var(--danger);">*</span></label><div class="input-wrapper"><i class="fas fa-user input-icon"></i><input type="text" id="regNome" placeholder="Seu nome completo" required></div></div>
                <div class="input-group"><label>E-mail <span style="color:var(--danger);">*</span></label><div class="input-wrapper"><i class="fas fa-envelope input-icon"></i><input type="email" id="regEmail" placeholder="seu@email.com" required></div></div>
                <div class="input-group"><label>Nº de Matrícula <span style="color:var(--danger);">*</span></label><div class="input-wrapper"><i class="fas fa-id-card input-icon"></i><input type="text" id="regMatricula" placeholder="Ex: 2024001" required></div></div>
                <div class="input-group"><label>Turma/Classe <span style="color:var(--danger);">*</span></label><select id="regTurma" required style="padding-left:0.75rem;"><option value="">Selecione...</option><option>10ª Classe</option><option>11ª Classe</option><option>12ª Classe</option><option>13ª Classe</option></select></div>
                <div class="input-group" style="position:relative;"><label>Telefone <span style="color:var(--text-tertiary);font-size:0.6875rem;">(opcional)</span></label>
                    <div class="phone-input-group" id="regPhoneGroup"><div class="country-selector" onclick="toggleCountryDropdown('reg')"><span id="regCountryFlag">🇦🇴</span><span style="font-weight:600;" id="regCountryCode">+244</span><span style="font-size:0.5rem;">▾</span></div><input type="tel" id="regTelefone" class="phone-number-input" placeholder="9XX XXX XXX" maxlength="15" oninput="formatPhoneNumber('reg')" onblur="validatePhoneField('reg')"></div>
                    <div class="phone-feedback hint" id="regPhoneFeedback">Ex: 923 456 789</div><div class="country-dropdown" id="regCountryDropdown"></div>
                </div>
                <div class="input-group"><label>Palavra-passe <span style="color:var(--danger);">*</span></label><div class="input-wrapper"><i class="fas fa-lock input-icon"></i><input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required minlength="6"><button type="button" class="toggle-password" onclick="togglePassword('regPassword',this)"><i class="fas fa-eye"></i></button></div></div>
                <div class="input-group"><label>Confirmar <span style="color:var(--danger);">*</span></label><div class="input-wrapper"><i class="fas fa-lock input-icon"></i><input type="password" id="regPasswordConfirm" placeholder="Repita" required></div></div>
                <button type="submit" class="btn-auth btn-auth-register"><i class="fas fa-user-graduate"></i> Criar Conta de Estudante</button>
                <p class="text-center" style="font-size:0.75rem;margin-top:0.75rem;">Já tem conta? <a href="#" onclick="switchAuthTab('login');return false;" style="color:var(--primary);">Faça login</a></p>
            </form>
        </div>
    </div>

    <div id="mainApp" class="hidden" style="display:flex;min-height:100vh;">
        <div id="sidebarOverlay" class="hidden" onclick="toggleSidebar()"></div>
        <aside id="sidebar" class="sidebar-hidden">
            <div class="sidebar-header"><div class="sidebar-logo"><i class="fas fa-landmark"></i></div><div class="sidebar-brand"><h2>Biblioteca CIV</h2><p>Sistema de Gestão</p></div></div>
            <nav id="sidebarMenu" class="sidebar-nav"></nav>
            <div class="sidebar-footer"><div class="sidebar-user"><div class="user-avatar" id="userAvatar">U</div><div class="sidebar-user-info"><p id="userName">Utilizador</p><span id="userRole">Perfil</span></div></div><button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Sair do Sistema</button></div>
        </aside>
        <main style="flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0;">
            <header class="main-header">
                <div class="header-left"><button class="btn-menu" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button><div class="header-title"><h1 id="pageTitle">Painel Principal</h1><div class="breadcrumb"><span>📚 Início</span><span>›</span><span id="breadcrumbCurrent">Painel Principal</span></div></div></div>
                <div class="header-right">
                    <div style="position:relative;display:none;" id="searchWrapper"><i class="fas fa-search" style="position:absolute;left:0.625rem;top:50%;transform:translateY(-50%);color:var(--icon-muted);font-size:0.75rem;"></i><input type="text" id="globalSearch" placeholder="Pesquisar livros..."></div>
                    <button class="btn-notification" onclick="showSection('loans')"><i class="fas fa-bell"></i><span class="notification-badge" id="notifBadge" style="display:none;">0</span></button>
                    <button class="btn-dark-mode" onclick="toggleDarkMode()"><i class="fas fa-moon" id="darkModeIcon"></i></button>
                </div>
            </header>
            <div class="main-content" id="mainContent"></div>
        </main>
    </div>
    <div id="toastContainer"></div>

    <script>
        // ========== CONFIGURAÇÕES ==========
        const countryData = [
            { code: '+244', name: 'Angola', flag: '🇦🇴', example: '923 456 789', regex: /^9\d{8}$/ },
            { code: '+351', name: 'Portugal', flag: '🇵🇹', example: '912 345 678', regex: /^9\d{8}$/ },
            { code: '+55', name: 'Brasil', flag: '🇧🇷', example: '(11) 91234-5678', regex: /^\d{10,11}$/ },
            { code: '+238', name: 'Cabo Verde', flag: '🇨🇻', example: '912 34 56', regex: /^\d{7}$/ },
            { code: '+258', name: 'Moçambique', flag: '🇲🇿', example: '82 345 6789', regex: /^\d{8,9}$/ }
        ];
        let selectedCountry = { 'reg': '+244' }, countryDropdowns = {};

        function initCountryDropdowns() {
            ['reg'].forEach(prefix => {
                const dd = document.getElementById(`${prefix}CountryDropdown`);
                if (!dd) return;
                dd.innerHTML = countryData.map((c, i) => `<div class="country-option ${c.code===selectedCountry[prefix]?'selected':''}" onclick="selectCountry('${prefix}','${c.code}',${i})"><span style="font-size:1.1rem;">${c.flag}</span><span style="flex:1;font-size:0.75rem;">${c.name}</span><span style="font-weight:600;">${c.code}</span></div>`).join('');
                countryDropdowns[prefix] = dd;
            });
        }
        function toggleCountryDropdown(prefix) {
            const dd = document.getElementById(`${prefix}CountryDropdown`); if (!dd) return;
            Object.values(countryDropdowns).forEach(d => { if (d && d !== dd) d.classList.remove('show'); });
            dd.classList.toggle('show');
            if (dd.classList.contains('show')) setTimeout(() => document.addEventListener('click', function cd(e) { if (!dd.parentElement.contains(e.target)) { dd.classList.remove('show'); document.removeEventListener('click', cd); } }), 10);
        }
        function selectCountry(prefix, code, index) {
            selectedCountry[prefix] = code; const c = countryData[index];
            document.getElementById(`${prefix}CountryFlag`).textContent = c.flag;
            document.getElementById(`${prefix}CountryCode`).textContent = c.code;
            const input = document.getElementById(`${prefix}Telefone`); if (input) { input.placeholder = c.example; input.value = ''; }
            document.getElementById(`${prefix}PhoneFeedback`).textContent = `Ex: ${c.example}`;
            document.getElementById(`${prefix}PhoneFeedback`).className = 'phone-feedback hint';
            document.getElementById(`${prefix}CountryDropdown`).classList.remove('show');
        }
        function formatPhoneNumber(prefix) { const input = document.getElementById(`${prefix}Telefone`); if (!input) return; let v = input.value.replace(/\D/g, ''); if (v.length > 3) v = v.slice(0, 3) + ' ' + v.slice(3, 6) + ' ' + v.slice(6, 9); else if (v.length > 0) v = v.slice(0, 3) + (v.length > 3 ? ' ' + v.slice(3) : ''); input.value = v; }
        function validatePhoneField(prefix) {
            const input = document.getElementById(`${prefix}Telefone`), group = document.getElementById(`${prefix}PhoneGroup`), fb = document.getElementById(`${prefix}PhoneFeedback`);
            if (!input || !group || !fb) return; const raw = input.value.replace(/\D/g, '');
            if (raw === '') { group.classList.remove('valid', 'invalid'); fb.textContent = `Ex: 923 456 789`; fb.className = 'phone-feedback hint'; return; }
            if (/^9\d{8}$/.test(raw)) { group.classList.add('valid'); group.classList.remove('invalid'); fb.textContent = '✅ Número válido'; fb.className = 'phone-feedback valid'; }
            else { group.classList.add('invalid'); group.classList.remove('valid'); fb.textContent = '⚠️ Formato: 9XX XXX XXX'; fb.className = 'phone-feedback invalid'; }
        }
        function getFullPhoneNumber(prefix) { const input = document.getElementById(`${prefix}Telefone`); return (input && input.value.trim()) ? selectedCountry[prefix] + ' ' + input.value.trim() : ''; }

        // ========== DADOS ==========
        function getUsers() { return JSON.parse(localStorage.getItem('biblio_users') || '[]'); }
        function saveUsers(u) { localStorage.setItem('biblio_users', JSON.stringify(u)); }
        function getCurrentUser() { return JSON.parse(localStorage.getItem('biblio_current') || 'null'); }
        function saveCurrentUser(u) { const { password, ...r } = u; localStorage.setItem('biblio_current', JSON.stringify(r)); }
        function getBooks() { return JSON.parse(localStorage.getItem('biblio_books') || '[]'); }
        function saveBooks(b) { localStorage.setItem('biblio_books', JSON.stringify(b)); }
        function getLoans() { return JSON.parse(localStorage.getItem('biblio_loans') || '[]'); }
        function saveLoans(l) { localStorage.setItem('biblio_loans', JSON.stringify(l)); }
        function getEstudantes() { return getUsers().filter(u => u.tipo === 'estudante'); }

        function showToast(msg, type = 'success') {
            const ct = document.getElementById('toastContainer'), t = document.createElement('div'); t.className = 'toast';
            const colors = { success: '#065F46', error: '#991B1B', warning: '#92400E', info: '#1E3A8A' };
            t.style.background = colors[type]; t.style.borderLeft = `4px solid ${type==='success'?'#34D399':type==='error'?'#F87171':type==='warning'?'#FBBF24':'#60A5FA'}`;
            t.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'exclamation-circle'}"></i><span>${msg}</span>`;
            ct.appendChild(t); setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(100%)'; t.style.transition = 'all 0.3s'; setTimeout(() => t.remove(), 300); }, 3500);
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode'); const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark); document.getElementById('darkModeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        function switchAuthTab(tab) {
            document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
            document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
        }
        function togglePassword(id, btn) { const i = document.getElementById(id); i.type = i.type === 'password' ? 'text' : 'password'; btn.querySelector('i').classList.toggle('fa-eye'); btn.querySelector('i').classList.toggle('fa-eye-slash'); }
        function logout() { localStorage.removeItem('biblio_current'); document.getElementById('mainApp').classList.add('hidden'); document.getElementById('authScreen').style.display = 'flex'; switchAuthTab('login'); showToast('Sessão terminada. Até breve!', 'info'); }

        function validarEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
        function validarNome(n) { return n.length >= 3 && /[A-Za-zÀ-ÖØ-öø-ÿ]/.test(n); }
        function validarMatricula(m) { return /^[A-Za-z0-9]{4,10}$/.test(m); }
        function mostrarErro(el, msg) { el.style.border = '1.5px solid var(--danger)'; el.style.background = 'var(--danger-light)'; const p = el.closest('.input-group'); if (!p) return; const old = p.querySelector('.form-error'); if (old) old.remove(); const s = document.createElement('span'); s.style.cssText = 'font-size:0.625rem;color:var(--danger);margin-top:0.25rem;display:block;'; s.textContent = '⚠️ ' + msg; p.appendChild(s); }
        function limparErros(f) { f.querySelectorAll('input,select').forEach(e => { e.style.border = ''; e.style.background = ''; }); f.querySelectorAll('.form-error').forEach(e => e.remove()); }

        // ⭐ LOGIN
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim().toLowerCase(), pw = document.getElementById('loginPassword').value;
            const user = getUsers().find(u => u.email.toLowerCase() === email && u.password === pw);
            if (!user) { showToast('E-mail ou palavra-passe incorretos!', 'error'); return; }
            if (user.status === 'inactivo') { showToast('Conta desativada.', 'error'); return; }
            if (user.email !== email) { const users = getUsers(); const idx = users.findIndex(u => u.id === user.id); if (idx !== -1) { users[idx].email = email; saveUsers(users); } }
            saveCurrentUser(user); document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden'); initApp(); showSection('dashboard');
            showToast(`Bem-vindo(a), ${user.nome}!`, 'success');
        });

        // ⭐ CADASTRO
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault(); limparErros(this);
            const nome = document.getElementById('regNome').value.trim(), email = document.getElementById('regEmail').value.trim().toLowerCase();
            const matricula = document.getElementById('regMatricula').value.trim(), turma = document.getElementById('regTurma').value;
            const telefone = getFullPhoneNumber('reg'), pw = document.getElementById('regPassword').value, pw2 = document.getElementById('regPasswordConfirm').value;
            let err = false;
            if (!validarNome(nome)) { mostrarErro(document.getElementById('regNome'), 'Nome deve conter letras'); err = true; }
            if (!validarEmail(email)) { mostrarErro(document.getElementById('regEmail'), 'E-mail inválido'); err = true; }
            else if (getUsers().some(u => u.email.toLowerCase() === email)) { mostrarErro(document.getElementById('regEmail'), 'E-mail já registado'); err = true; }
            if (!validarMatricula(matricula)) { mostrarErro(document.getElementById('regMatricula'), '4-10 caracteres'); err = true; }
            else if (getUsers().some(u => u.matricula === matricula)) { mostrarErro(document.getElementById('regMatricula'), 'Matrícula já existe'); err = true; }
            if (!turma) { mostrarErro(document.getElementById('regTurma'), 'Selecione a turma'); err = true; }
            if (pw.length < 6) { mostrarErro(document.getElementById('regPassword'), 'Mínimo 6 caracteres'); err = true; }
            if (pw !== pw2) { mostrarErro(document.getElementById('regPasswordConfirm'), 'Não coincidem'); err = true; }
            if (err) return;
            const users = getUsers();
            users.push({ id: Date.now(), nome, email, password: pw, tipo: 'estudante', matricula, turma, telefone, avatar: nome.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2), status: 'activo', dataCriacao: new Date().toISOString().split('T')[0] });

        function getBookCover(book) { return (book.coverUrl && book.coverUrl.trim()) ? book.coverUrl : null; }

            const colors = ['#C8102E', '#1E40AF', '#059669', '#7C3AED', '#D97706', '#0EA5E9', '#DC2626', '#E6B300'];
            let hash = 0; for (let i = 0; i < nome.length; i++) hash = nome.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        function solicitarEmprestimo(bookId) {
            const user = getCurrentUser(), books = getBooks(), book = books.find(b => b.id === bookId);

            if (user.tipo !== 'gestor') {
                const loans = getLoans(), hoje = new Date(), dp = new Date(hoje); dp.setDate(dp.getDate() + 14);
                loans.push({ id: Date.now(), userId: user.id, userName: user.nome, bookId: book.id, bookTitulo: book.titulo, dataEmprestimo: hoje.toISOString().split('T')[0], dataPrevista: dp.toISOString().split('T')[0], dataDevolucao: null, multa: 0 });
                saveLoans(loans); book.status = 'emprestado'; saveBooks(books);
                showToast(`Empréstimo OK! Devolver até ${dp.toLocaleDateString('pt-AO')}`, 'success');
                renderBooksSection(); updateNotifBadge();
            } else { openLoanModal(bookId); }
        }

        function devolverLivro(loanId) {
            if (!confirm('Confirmar devolução?')) return;

            if (i === -1) { showToast('Não encontrado!', 'error'); return; }
            const loan = loans[i], hoje = new Date(), dias = Math.ceil((hoje - new Date(loan.dataPrevista)) / (1000 * 60 * 60 * 24));
            loan.dataDevolucao = hoje.toISOString().split('T')[0];
            if (dias > 0) { loan.multa = dias * 50; showToast(`Devolvido com ${dias} dia(s) de atraso. Multa: ${loan.multa} Kz`, 'warning'); }
            else { loan.multa = 0; showToast('Livro devolvido! Sem multa.', 'success'); }
            loans[i] = loan; saveLoans(loans);
            const books = getBooks(), bi = books.findIndex(b => b.id === loan.bookId);
            if (bi !== -1) { books[bi].status = 'disponivel'; saveBooks(books); }
            renderLoansSection(); updateNotifBadge();
        }
